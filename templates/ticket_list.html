<!DOCTYPE html>
<html>
<head>
<title>DevTracker - Tickets</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="header">
    DevTracker
</div>

<div class="container">

<div class="card">

<h2 class="page-title">Issue Tracker</h2>

{% if tickets %}

<table class="ticket-table">

<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for ticket in tickets %}

<tr>

<td>#{{ ticket.id }}</td>

<td class="ticket-title">
{{ ticket.title }}
</td>

<td>
<span class="priority {{ ticket.priority }}">
{{ ticket.priority|capitalize }}
</span>
</td>

<td>

<span class="status {{ ticket.status }}">
{{ ticket.status|replace("_"," ")|capitalize }}
</span>

</td>

<td>

<a href="/ticket/{{ ticket.id }}">
<button class="view-btn">View</button>
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% else %}

<p class="empty-msg">No tickets available</p>

{% endif %}

<div class="action-area">
<button onclick="window.location.href='/dashboard'" class="secondary-btn">
Back to Dashboard
</button>
</div>

</div>

</div>

</body>
</html>
